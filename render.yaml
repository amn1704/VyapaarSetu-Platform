# Render Deployment Configuration for VyapaarSetu Backend
# DEPLOYMENT INSTRUCTIONS:
# 1. Delete any existing Blueprint or service
# 2. Click "New +" -> "Web Service"
# 3. Connect your GitHub repo
# 4. Configure:
#    - Name: vyapaarsetu-api
#    - Runtime: Docker
#    - Root Directory: ./ (repo root)
#    - Dockerfile Path: ./Dockerfile
#    - Plan: Free
# 5. Add Environment Variables (see below)
# 6. Click "Create Web Service"

services:
  - type: web
    name: vyapaarsetu-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vyapaarsetu.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
      - key: ENABLE_LLM
        value: "false"
      - key: PYTHONPATH
        value: /app
