# Render Deployment Configuration for VyapaarSetu Backend
# Uses Docker deployment (see Dockerfile in repo root)
# Deploy to: https://render.com

services:
  - type: web
    name: vyapaarsetu-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vyapaarsetu.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
