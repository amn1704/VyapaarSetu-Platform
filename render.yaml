# Render Deployment Configuration for VyapaarSetu Backend
# Deploy to: https://render.com

services:
  # FastAPI Web Service
  - type: web
    name: vyapaarsetu-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/backend uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vyapaarsetu.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
