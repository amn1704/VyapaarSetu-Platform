# Render Deployment Configuration for VyapaarSetu Backend
# Deploy to: https://render.com
# Note: Add PostgreSQL database manually in Render dashboard after deployment

services:
  # FastAPI Web Service
  - type: web
    name: vyapaarsetu-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vyapaarsetu.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
